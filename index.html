<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Anna</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #001a4d, #005eff, #6dd5ff);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .card {
      width: 85%;
      max-width: 750px;
      margin: 50px auto;
      padding: 35px;
      border-radius: 30px;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
      animation: enter 1.4s ease;
    }

    @keyframes enter {
      from { transform: scale(0.5) rotateY(180deg); opacity: 0; }
      to { transform: scale(1) rotateY(0); opacity: 1; }
    }

    h1 {
      font-size: 45px;
      text-shadow: 0 0 15px cyan;
    }

    h3 {
      color: #ffe082;
      font-size: 26px;
      text-shadow: 2px 2px 10px black;
    }

    img {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid white;
      box-shadow: 0 0 35px cyan;
      transition: 0.5s;
    }

    img:hover {
      transform: scale(1.1) rotateY(20deg);
    }

    p {
      font-size: 21px;
      line-height: 1.6;
    }

    button {
      padding: 15px 35px;
      font-size: 20px;
      border: none;
      border-radius: 35px;
      background: white;
      color: #005eff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 12px 25px rgba(0,0,0,0.4);
      transition: 0.4s;
    }

    button:hover {
      transform: translateY(-8px) scale(1.08);
      box-shadow: 0 0 30px cyan;
    }

    #surprise {
      margin-top: 25px;
      font-size: 25px;
      color: #fff700;
      text-shadow: 0 0 15px black;
      min-height: 80px;
    }

    .float {
      position: absolute;
      bottom: -100px;
      font-size: 38px;
      animation: fly 8s infinite;
    }

    @keyframes fly {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-950px) rotate(360deg); opacity: 0; }
    }

    .b1 { left: 10%; animation-delay: 0s; }
    .b2 { left: 25%; animation-delay: 2s; }
    .b3 { left: 45%; animation-delay: 4s; }
    .b4 { left: 65%; animation-delay: 1s; }
    .b5 { left: 85%; animation-delay: 3s; }

    .heart {
      position: absolute;
      font-size: 30px;
      animation: heartFly 3s linear forwards;
    }

    @keyframes heartFly {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-300px); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="float b1">🎈</div>
  <div class="float b2">🎂</div>
  <div class="float b3">🎉</div>
  <div class="float b4">🎁</div>
  <div class="float b5">✨</div>

  <div class="card">
    <h1>🎉 Happy Birthday, Anna! 😎</h1>

    <h3>🥲 Sorry for my belated wishes, Anna.</h3>

    <img src="brother.jpg" alt="My Brother">

    <p>
      You are not just my brother, you are my support, my happiness,
      and one of the most special people in my life.
    </p>

    <button onclick="showSurprise()">Click for Surprise ✨</button>

    <h2 id="surprise"></h2>
  </div>

<script>
function showSurprise() {

    let message =
    "🥲 Sorry for my belated wishes, Anna. 💙\n\n" +
   "You are not just my brother, you are my biggest support and one of the most important people in my life.\n\n" +
    "May your life be filled with happiness, success, good health, endless smiles, and all your dreams come true.\n\n" +
    "Happy Birthday once again, Anna! 🎂🎉";

    let i = 0;
    document.getElementById("surprise").innerHTML = "";

    function typeWriter() {
        if (i < message.length) {
            document.getElementById("surprise").innerHTML += message.charAt(i);
            i++;
            setTimeout(typeWriter, 40);
        }
    }

    typeWriter();

    document.body.style.background =
    "linear-gradient(135deg,#000428,#004e92,#00c6ff)";

    let icons = ["⭐","✨","🌟","🌙","💫","☄️"];

    for (let j = 0; j < 40; j++) {

        let star = document.createElement("div");

        star.innerHTML = icons[Math.floor(Math.random()*icons.length)];

        star.style.position = "absolute";
        star.style.left = Math.random()*100 + "vw";
        star.style.top = "100vh";
        star.style.fontSize = (20 + Math.random()*25) + "px";
        star.style.transition = "all 4s ease-out";

        document.body.appendChild(star);

        setTimeout(function(){
            star.style.top = "-100px";
            star.style.transform =
            "rotate(360deg) scale(1.5)";
            star.style.opacity = "0";
        },100);

        setTimeout(function(){
            star.remove();
        },4000);
    }
}
</script>
 </body>
</html>
